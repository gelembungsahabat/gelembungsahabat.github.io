<div id="page-content">
  <div class="wrapper">
    <div class="header">
      <img
        src="/images/makeine2.jpg"
        alt="makeine-background"
        class="background"
      />
      <div class="flex-container">
        <div>
          <h1>Anime Recommendation</h1>
          <h2>This Is Anime Recommendation from Me</h2>
          <div class="warning-container">
            <i
              data-eva="alert-triangle-outline"
              data-eva-fill="#ff6161"
              class="icon"
            ></i>
            <p>This Website is under development</p>
          </div>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="card-container">
        <a
          href="https://github.com/gelembungsahabat?tab=repositories"
          class="card has-bg-img project-list-img"
        >
          <div class="card-title-container">
            <span class="card-title">Project List</span>
          </div>
        </a>
        <a
          class="card has-bg-img anime-recommendation-img"
          hx-get="/hx/pages/anime-recommendation.html"
          hx-target="#page-content"
          hx-swap="innerHTML"
          hx-replace-url="/"
          hx-push-url="/anime-recommendation"
          hx-on:click="
            htmx.ajax('GET', '/hx/components/navbar-anime-recommendation-active.html', {target:'#navbar', swap:'outerHTML'})
          "
        >
          <div class="card-title-container">
            <span class="card-title">Anime Recommendation</span>
          </div>
        </a>
        <div class="card has-bg-img fun-things-img">
          <div class="card-title-container">
            <span class="card-title">Fun Things</span>
          </div>
        </div>
      </div>
    </div>
    <!-- footer -->
    <footer>
      <div class="footer-content">
        Copyright © <span id="copyright-year"></span> All Rights Reserved.
        Muhammad Wildan Nur Karim
      </div>
    </footer>
  </div>
  <script>
    eva.replace();
    document
      .getElementById("copyright-year")
      .appendChild(document.createTextNode(new Date().getFullYear()));
  </script>
</div>
