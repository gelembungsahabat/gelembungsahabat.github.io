<div class="navbar-container-pages" id="navbar">
  <ul id="navbar-ul">
    <li>
      <a
        hx-get="/hx/pages/home.html"
        hx-target="#page-content"
        hx-swap="innerHTML"
        hx-replace-url="/"
        hx-push-url="/"
        hx-on:click="
        htmx.ajax('GET', '/hx/components/navbar-home-active.html', {target:'#navbar', swap:'outerHTML'})
      "
      >
        <i data-eva="home-outline" data-eva-fill="#ffffff" class="icon"></i>
      </a>
    </li>
    <li class="navbar-title-home">Anime Recommendation</li>
    <li>
      <a
        class="active"
        hx-get="/hx/pages/anime-recommendation.html"
        hx-target="#page-content"
        hx-swap="innerHTML"
        hx-replace-url="/"
        hx-push-url="/anime-recommendation"
        hx-on:click="
          htmx.ajax('GET', '/hx/components/navbar-anime-recommendation-active.html', {target:'#navbar', swap:'outerHTML'})
        "
      >
        <i
          data-eva="star-outline"
          data-eva-fill="#21ff5c"
          class="icon-pages"
        ></i>
      </a>
    </li>
  </ul>
  <script>
    eva.replace();
  </script>
</div>
